# Параметры агентов (соответствуют Таблице 4.1)
agents:
  uav:
    type: "quadrotor"
    kinematics:
      max_linear_velocity: 15.0      # м/с
      max_angular_velocity: 1.2      # рад/с
      turn_radius: 1.5               # м
    sensors:
      lidar_range: 30.0              # м
      lidar_accuracy: 0.05           # м
      update_rate: 10.0              # Гц
    communication:
      range: 100.0                   # м
      bandwidth_mbps: 2.0
      latency_model: {mean_ms: 20.0, std_ms: 5.0}
    energy:
      capacity_mah: 5000
      consumption_motion_w: 25.0
      consumption_idle_w: 3.0
    compute:
      control_freq_hz: 10.0
      ml_memory_mb: 512

  ugv:
    type: "differential"
    kinematics:
      max_linear_velocity: 3.5
      max_angular_velocity: 0.8
      turn_radius: 0.5
    sensors:
      lidar_range: 15.0
      lidar_accuracy: 0.03
      update_rate: 20.0
    communication:
      range: 50.0
      bandwidth_mbps: 2.0
      latency_model: {mean_ms: 20.0, std_ms: 5.0}
    energy:
      capacity_mah: 10000
      consumption_motion_w: 12.0
      consumption_idle_w: 2.0
    compute:
      control_freq_hz: 20.0
      ml_memory_mb: 256